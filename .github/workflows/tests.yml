name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-windows:
    name: Python, frontend, browser, and Rust
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      WRITER_PYTHON_EXE: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tauri-mvp/frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-mvp/frontend/src-tauri

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: tauri-mvp/frontend
        run: npm ci

      - name: Run complete Python suite
        run: python -m pytest -q

      - name: Run frontend unit tests
        working-directory: tauri-mvp/frontend
        run: npm test -- --run

      - name: Reject unsafe screen-level error rendering
        shell: pwsh
        run: |
          $matches = rg -n 'e instanceof Error|error instanceof Error|String\((e|error)\)' tauri-mvp/frontend/src --glob '*.ts' --glob '*.vue' --glob '!**/api/base.ts'
          if ($LASTEXITCODE -eq 0) {
            $matches
            throw 'Public screens must use the shared safe error formatter.'
          }
          if ($LASTEXITCODE -gt 1) { throw 'Static error audit could not run.' }

      - name: Build frontend
        working-directory: tauri-mvp/frontend
        run: npm run build

      - name: Run mocked browser workflows
        working-directory: tauri-mvp/frontend
        run: npm run test:e2e -- --project=msedge --workers=1

      - name: Run isolated real-backend browser workflows
        working-directory: tauri-mvp/frontend
        run: npm run test:e2e:real -- --project=msedge --workers=1

      - name: Check Tauri Rust application
        run: cargo check --locked --manifest-path tauri-mvp/frontend/src-tauri/Cargo.toml

      - name: Upload browser diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            tauri-mvp/frontend/test-results
            tauri-mvp/frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7
