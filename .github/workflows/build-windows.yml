name: Legacy Python UI Build (Manual Only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows portable zip
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build portable bundle
        shell: pwsh
        run: .\scripts\build_windows.ps1 -PythonExe python

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacy-writer-portable-windows
          path: |
            dist/Writer-*-portable.zip
            dist/Writer-portable.zip
          if-no-files-found: error
